# Layer rules (layer_name is regex-matched against the surface's namespace)
layerrule=noanim:1,layer_name:vicinae
# DMS OSDs (volume/brightness/etc., namespace "dms:osd") have transparent
# margins; blurring the layer samples around the pill and leaves a dark halo.
layerrule=noblur:1,layer_name:dms:osd
