# More option see https://github.com/DreamMaoMao/mango/wiki/
#
# NOTE: Appearance is managed by DMS via the sourced files at the bottom:
#   - dms/colors.conf  -> bordercolor, focuscolor, urgentcolor
#   - dms/layout.conf  -> border_radius, gappi{h,v}, gappo{h,v}, borderpx
# Don't set those here; DMS sources override at the end of this file.

# Window effect
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=250
animation_duration_open=200
animation_duration_tag=200
animation_duration_close=250
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Layer rules
layerrule=noanim:1,layer_name:vicinae

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance (colors NOT managed by DMS; border/focus/urgent come from dms/colors.conf)
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
rootcolor=0x201b14ff
maximizescreencolor=0x89aa61ff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# ============================================================
# Key Bindings (ported from my Hyprland config, SUPER = mod)
# key names refer to `xev`/`wev`; mods: super,ctrl,alt,shift,none
# Hyprland workspaces -> mango tags; special workspace -> scratchpad.
# ============================================================
mod=SUPER

# apps / launchers
bind=SUPER,Return,spawn,ghostty
bind=SUPER,B,spawn,zen-beta
bind=SUPER,E,spawn,nautilus
bind=SUPER,R,spawn,vicinae toggle
bind=SUPER,V,spawn,vicinae vicinae://launch/clipboard/history
bind=CTRL+ALT,E,spawn,vicinae vicinae://launch/core/search-emojis
bind=NONE,Print,spawn,dms screenshot -d ~/Pictures/Screenshots

# window management
bind=SUPER,Q,killclient,
bind=SUPER,M,quit
bind=SUPER+SHIFT,V,togglefloating,
bind=SUPER,F,togglemaximizescreen,
bind=SUPER+SHIFT,F,togglefullscreen,
bind=SUPER,ESCAPE,spawn,dms ipc powermenu toggle

# mango-only niceties (no Hyprland equivalent)
bind=SUPER+SHIFT,R,reload_config
bind=SUPER,Tab,toggleoverview,
bind=SUPER,N,switch_layout

# move focus (arrows)
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# move window (arrows)
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# tags: focus tag N
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tags: move focused window to tag N
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# scratchpad (was Hyprland special workspace "magic")
bind=SUPER,S,toggle_scratchpad

# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings (SUPER + scroll to switch tags, was SUPER + mouse wheel)
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Multimedia keys
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl -e4 -n2 set 5%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl -e4 -n2 set 5%-
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPause,spawn,playerctl play-pause
bind=NONE,XF86AudioPrev,spawn,playerctl previous

source=./dms/layout.conf
source=./dms/colors.conf
source=./dms/cursor.conf
