# MangoWC config — split by purpose into conf.d/.
# Edit the individual files in conf.d/; this file just sources them in order.
# More options: https://github.com/DreamMaoMao/mango/wiki/
#
# NOTE: Appearance is managed by DMS via the dms/ sources at the bottom:
#   - dms/colors.conf  -> bordercolor, focuscolor, urgentcolor
#   - dms/layout.conf  -> border_radius, gappi{h,v}, gappo{h,v}, borderpx
# Don't set those in conf.d/appearance.conf; the DMS sources override them last.

source=./conf.d/effects.conf
source=./conf.d/animations.conf
source=./conf.d/layer-rules.conf
source=./conf.d/layout.conf
source=./conf.d/behavior.conf
source=./conf.d/input.conf
source=./conf.d/appearance.conf
source=./conf.d/keybindings.conf

source=./autostart.conf

# DMS appearance overrides — must stay last so they win.
source=./dms/layout.conf
source=./dms/colors.conf
source=./dms/cursor.conf
